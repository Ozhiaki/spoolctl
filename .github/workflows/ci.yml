name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit and contract suite
        run: python -m unittest discover -s tests -v
      - name: Single-file build smoke test
        run: |
          python scripts/build_single_file.py dist/spoolctl.py
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/dist/spoolctl.py" --help
          python "$GITHUB_WORKSPACE/dist/spoolctl.py" capabilities --json > /dev/null
